<!DOCTYPE html>
<html lang="en">

<head>
  <title>GTNgame 2026</title>
  <meta charset="UTF-8">
  <meta name="description" content="Guess The Number Game">
  <meta name="keywords" content="13COMP, Firebase">
  <meta name="author" content="Mr Britton">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module" src="https://q5js.org/q5.js"></script>
  <link rel="stylesheet" href="./css/GTNgame.css">
</head>

<body>
  <nav class="pages">
    <div class="pagesLeft">
      <div class="page"><a href="game1.html">Gnome Dodger</a></div>
      <div class="page"><a href="leaderboards.html">Leaderboards</a></div>
      <div class="page"><a href="admin.html">ADMIN LOGIN</a></div>
    </div>

    <div class="pagesProfile">
      <img id="pfp" class="pfp" src="images/defaultpfp.png" alt="Profile Picture">
    </div>
  </nav>
  <button id="leaveBtn">Leave Game</button>
  <h1>Guess The Number</h1>

  <!--*********** GAME CONTENT HTML ***********-->
  <div class="gameLayout">

    <div class="gamePlayer leftPlayer">
      <p class="gamePlayerInfo">Player 1<br>Wins: 0</p>
      <img id="player1Crown" class="crown" src="images/crown.png" alt="Crown Icon">
      <img id="player1Pfp" src="images/defaultpfp.png" alt="Player 1 Profile Picture">
      <p id="player1Name" class="gamePlayerName">Player 1</p>
    </div>

    <div class="gameGuessBox">
      <h2>Guess The Number</h2>

      <div class="turnDisplay">
        <p>TURN FOR</p>
        <img class="pfpTurn" src="images/defaultpfp.png" alt="Current Turn Profile Picture">
      </div>

      <input id="guessInput" type="number" min="1" max="100" placeholder="Enter guess">

      <button id="guessBtn">Submit Guess</button>

      <p id="guessStatus">Waiting for guess...</p>
      <p id="guessResultDisplay"></p>
    </div>

    <div class="gamePlayer rightPlayer">
      <p class="gamePlayerInfo">Player 2<br>Wins: 0</p>
      <img id="player2Crown" class="crown" src="images/crown.png" alt="Crown Icon">
      <img id="player2Pfp" src="images/defaultpfp.png" alt="Player 2 Profile Picture">
      <p id="player2Name" class="gamePlayerName">Player 2</p>
    </div>

  </div>
  <!--*********** GAME CONTENT HTML ***********-->

  <script type="module">
    import { setupGTNgame } from './GTNgame.mjs';
    setupGTNgame();
  </script>
</body>

</html>
